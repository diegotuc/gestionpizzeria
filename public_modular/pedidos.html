<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>🍕 Cocina - Pedidos</title>

    <link
        rel="stylesheet"
        href="pedidos.css"
    >

</head>

<body>

<!-- ===================================== -->
<!-- TOPBAR -->
<!-- ===================================== -->

<header class="topbar">

    <div>

        <h1>
            🍕 Panel de Cocina
        </h1>

        <div id="estadoSistema">
            🟡 Conectando...
        </div>

    </div>

    <div class="acciones-topbar">

    <button onclick="obtenerPedidos()">
        🔄 Actualizar
    </button>

    <button onclick="abrirHistorial()">
        📋 Historial
    </button>

    <button
        data-filtro="todos"
        onclick="setFiltro('todos')"
    >
        Todos
    </button>

    <button
        data-filtro="pendiente"
        onclick="setFiltro('pendiente')"
    >
        Pendientes
    </button>

    <button
        data-filtro="preparando"
        onclick="setFiltro('preparando')"
    >
        Preparando
    </button>

    <button
        data-filtro="listo"
        onclick="setFiltro('listo')"
    >
        Listos
    </button>

    <button
        data-filtro="entregado"
        onclick="setFiltro('entregado')"
    >
        Entregados
    </button>

</div>

</header>


<!-- ===================================== -->
<!-- MÉTRICAS -->
<!-- ===================================== -->

<section class="metricas">

    <div id="contadorPendientes">
        📊 Pendientes: 0
    </div>

    <div id="contadorExtra">

        👨‍🍳 Preparando: 0 |

        ✅ Listos: 0 |

        🚚 Entregados: 0

    </div>

    <div id="contadorCriticos">
        🚨 Críticos: 0
    </div>

</section>


<!-- ===================================== -->
<!-- ALERTAS GLOBALES -->
<!-- ===================================== -->

<section class="panel-alertas-globales">

    <!-- ================================= -->
    <!-- CUELLO DE BOTELLA -->
    <!-- ================================= -->

    <div
        id="panelCuelloBotella"
        class="panel-cuello oculto"
    >

        <strong id="textoCuelloBotella"></strong>

    </div>


    <!-- ================================= -->
    <!-- PANEL CRÍTICOS -->
    <!-- ================================= -->

    <div
        id="panelCriticos"
        class="panel-criticos oculto"
    >

        <h3 id="tituloCriticos">
            🚨 Pedidos críticos
        </h3>

        <div
            id="gridCriticos"
            class="criticos-grid"
        ></div>

    </div>

</section>


<!-- ===================================== -->
<!-- ALERTAS LEGACY -->
<!-- ===================================== -->

<div
    id="alertaCocina"
    class="alerta-cocina"
>

    🚨 COCINA SATURADA

</div>

<div
    id="alertaCriticos"
    class="alerta-criticos"
>

    🚨 EXISTEN PEDIDOS CRÍTICOS

</div>


   

<!-- ===================================== -->
<!-- TABLERO PRINCIPAL -->
<!-- ===================================== -->

<main class="tablero-cocina">



    <!-- ================================= -->
    <!-- PENDIENTES -->
    <!-- ================================= -->

    <section class="columna">

        <h2
            id="tituloPendientes"
            class="titulo-columna pendiente"
        >
            🟠 Pendientes
        </h2>

        <div id="colPendientes"></div>

    </section>


    <!-- ================================= -->
    <!-- PREPARANDO -->
    <!-- ================================= -->

    <section class="columna">

        <h2
            id="tituloPreparando"
            class="titulo-columna preparando"
        >
            🔵 Preparando
        </h2>

        <div id="colPreparando"></div>

    </section>


    <!-- ================================= -->
    <!-- LISTOS -->
    <!-- ================================= -->

    <section class="columna">

        <h2
            id="tituloListos"
            class="titulo-columna listo"
        >
            🟢 Listos
        </h2>

        <div id="colListos"></div>

    </section>

</main>


 <!-- ================================= -->
    <!-- MÉTRICAS OPERACIONALES -->
    <!-- ================================= -->

    <div id="metricasOperacionales"
         class="metricas-operacionales">
    </div>

<!-- ===================================== -->
<!-- MODAL HISTORIAL -->
<!-- ===================================== -->

<div
    id="modalHistorial"
    class="modal-historial"
    style="display: none;"
>

    <div class="modal-contenido">

        <!-- ============================= -->
        <!-- HEADER MODAL -->
        <!-- ============================= -->

        <div class="modal-header">

            <h2>
                📋 Historial Pedidos
            </h2>

            <button
                onclick="cerrarHistorial()"
            >
                ✖
            </button>

        </div>


        <!-- ============================= -->
        <!-- CONTENIDO HISTORIAL -->
        <!-- ============================= -->

        <div
            id="contenidoHistorial"
            class="contenido-historial"
        >

            <p>
                Cargando historial...
            </p>

        </div>

    </div>

</div>


<!-- ===================================== -->
<!-- FOOTER -->
<!-- ===================================== -->

<footer class="footer-panel">

    <button onclick="volver()">
        ← Volver
    </button>

</footer>


<!-- ===================================== -->
<!-- TEMPLATE PANEL CRÍTICOS -->
<!-- ===================================== -->

<template id="templateCritico">

    <div class="critico-item">

        <!-- ============================= -->
        <!-- HEADER -->
        <!-- ============================= -->

        <div class="critico-header">

            <b class="critico-titulo">
                🍕 Pedido
            </b>

            <button class="btn-ir-pedido">
                VER
            </button>

        </div>


        <!-- ============================= -->
        <!-- DATOS -->
        <!-- ============================= -->

        <div class="critico-cliente"></div>

        <div class="critico-estado"></div>

        <div class="critico-tiempo"></div>

        <div class="critico-alerta"></div>

    </div>

</template>


<!-- ===================================== -->
<!-- SCRIPT -->
<!-- ===================================== -->

<script src="/modulos/pedidos/pedidos.state.js"></script>

<script src="/modulos/pedidos/pedidos.config.js"></script>

<script src="/modulos/pedidos/pedidos.constants.js"></script>

<script src="/modulos/pedidos/pedidos.utils.js"></script>

<script src="/modulos/pedidos/pedidos.sla.js"></script>

<script src="/modulos/pedidos/pedidos.audio.js"></script>

<script src="/modulos/pedidos/pedidos.render.js"></script>

<script src="/modulos/pedidos/pedidos.monitor.js"></script>

<script src="/modulos/pedidos/pedidos.ui.js"></script>

<script src="/modulos/pedidos/pedidos.actions.js"></script>

<script src="/modulos/pedidos/pedidos.api.js"></script>

<script src="/modulos/pedidos/pedidos.data.js"></script>

<script src="/modulos/pedidos/pedidos.polling.js"></script>

<script src="/modulos/pedidos/pedidos.init.js"></script>

<script src="pedidos.js"></script>


</body>
</html>
