<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caja</title>
  <link rel="stylesheet" href="css/caja.css">
</head>
<body>

  <div class="container">
    <h1>💰 Caja</h1>

    <div class="venta-info">
      <label>ID Venta:</label>
      <input type="number" id="ventaId" placeholder="Ej: 1">
      
      <label>Total:</label>
      <input type="number" id="totalVenta" placeholder="Ej: 500">
    </div>

    <div class="pago">
      <label>Dinero recibido:</label>
      <input type="number" id="montoRecibido">

      <label>Vuelto:</label>
      <input type="text" id="vuelto" readonly>
    </div>

    <button id="btnCobrar">Cobrar</button>

    <p id="mensaje"></p>
  </div>

  <script src="js/caja.js"></script>
</body>
</html>
