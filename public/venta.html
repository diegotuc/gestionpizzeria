<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Venta Diaria</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header>
    <h1>🧾 Venta Diaria</h1>
  </header>
 
  

<!-- CLIENTE -->
<section class="card">
  <h2>Cliente</h2>
  <input type="text" id="clienteNombre" placeholder="Nombre">
  <input type="text" id="clienteTelefono" placeholder="Teléfono">
  
  <select id="tipoCliente">
    <option value="minorista">Minorista</option>
    <option value="mayorista">Mayorista</option>
    <option value="revendedor">Revendedor</option>
  </select>
</section>



<!-- SABORES -->
<section class="card">
  <h2>Sabores</h2>
  <div id="listaSabores" class="sabores-grid"></div>
</section>

<!--MESAJE DE VENTA REALIZADA, ERROR O CANCELADA-->

<div id="mensajeSistema" class="mensaje oculto"></div>

<!-- TICKET -->
<section class="card">
  <h2>Ticket</h2>
  <ul id="ticket"></ul>

  <div class="linea">
    <span>Descuento</span>
    <span id="descuento">$0</span>
  </div>

  <div class="total">
    <span>TOTAL</span>
    <span id="total">$0</span>
  </div>
</section>

<!-- METODO DE PAGO -->
<section class="card">
  <h2>Método de Pago</h2>
  <select id="metodoPago">
    <option value="efectivo">Efectivo</option>
    <option value="transferencia">Transferencia</option>
    <option value="tarjeta">Tarjeta</option>
  </select>
 
</section>
<div id="infoCaja"></div>




<!-- ACCIONES -->
<section class="acciones">
  <button class="confirmar">Confirmar venta</button>
  <button class="cancelar">Cancelar</button>
  
</section>

<!-- =============================== -->
<!-- 🔹 IR A DASHBOARD DE CAJA -->
<!-- =============================== -->
<section>
  <!-- =============================== -->
<!-- 🔹 ACCESO A HISTORIAL DE CAJA -->
<!-- =============================== -->
<section>
  <button class="btn-historial" onclick="irAHistorialCaja()">Ver Historial de Caja</button>
</section>
</section>

<section>
  <button id="btnAbrirCaja">Abrir Caja</button>
  <button id="btnCerrarCaja">Cerrar Caja</button>
</section>


<script src="/js/app.js"></script>
<script src="/js/caja.js"></script>
</body>
</html>
