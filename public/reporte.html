<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte de Ventas</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="filtros-barra">
    <label>Desde:</label>
    <input type="date" id="fechaDesde">
  
    <label>Hasta:</label>
    <input type="date" id="fechaHasta">
  </div>
  
    <div class="filtros-acciones"></div>
      <button onclick="filtrarVentas()" class="btn btn-filtrar">Filtrar</button>
      <button onclick="resetearFiltro()" class="btn btn-reset">Mostrar todas</button>
    </div>

  <div class="dashboard">

    <div class="col">
      <h2>📈 Gráfico</h2>
      <canvas id="graficoVentas"></canvas>
    </div>
  
    <div class="col">
      <h2>📊 Estadísticas</h2>
      <div id="estadisticas"></div>
    </div>
  
  </div>

<h1>📊 Reporte de Ventas</h1>
  <table border="1" width="100%" cellpadding="8">
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Total Bruto</th>
        <th>Descuento</th>
        <th>Total Final</th>
        <th>Tipo</th>
      </tr>
    </thead>
    <tbody id="tablaVentas">
    </tbody>
  </table>
 
 

  <br>
  
  <button onclick="irAVentas()" class="btn-volver">
    ← Volver a ventas
  </button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/reporte.js"></script>

</body>
</html>
