<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes</title>

<link rel="stylesheet" href="/css/styles_clientes.css">
</head>

<body>

<h1>👥 Clientes</h1>

<!-- ============================= -->
<!-- TABS -->
<!-- ============================= -->

<div style="margin-bottom:20px;">
  <button class="tab-btn active" onclick="mostrarTab(event, 'clientesTab')">Clientes</button>
  <button class="tab-btn" onclick="mostrarTab(event, 'rankingTab')">Rankings</button>
</div>

<!-- ============================= -->
<!-- TAB CLIENTES -->
<!-- ============================= -->

<div id="clientesTab">

  <!-- BUSCAR -->
  <div class="card">
    <h3>Buscar cliente</h3>

    <input type="text" id="telefonoBuscar" placeholder="Teléfono">
    <button id="buscarCliente">Buscar</button>
  </div>

  <!-- LISTADO -->
  <div class="card">

    <h3>📋 Listado de clientes</h3>

    <input type="text" id="filtroBusqueda" placeholder="Buscar nombre o teléfono">

    <select id="filtroTipo">
      <option value="">Todos</option>
      <option value="NUEVO">Nuevo</option>
      <option value="OCASIONAL">Ocasional</option>
      <option value="FRECUENTE">Frecuente</option>
    </select>

    <button id="btnFiltrar">Filtrar</button>

    <div id="listaClientes"></div>

  </div>

  <!-- INFO -->
  <div class="card" id="infoCliente" style="display:none;">

    <h3>Datos del cliente</h3>

    <strong>Tipo de cliente:</strong>
    <span id="resumenTipo"></span>

    <div class="dato">
      <strong>Nombre:</strong>
      <span id="nombreCliente"></span>
    </div>

    <div class="dato">
      <strong>Teléfono:</strong>
      <span id="telefonoCliente"></span>
    </div>

    <div class="dato">
      <strong>Pizzas acumuladas:</strong>
      <span id="pizzasCliente"></span>
    </div>

    <button id="verHistorial">Ver historial</button>

    <div class="historial" id="historialVentas"></div>

  </div>

  <!-- RESUMEN -->
  <div class="card" id="resumenCard" style="display:none;">
    <h3>📊 Resumen del cliente</h3>

    <div class="dato"><strong>Compras:</strong> <span id="resumenCompras"></span></div>
    <div class="dato"><strong>Pizzas:</strong> <span id="resumenPizzas"></span></div>
    <div class="dato"><strong>Promedio:</strong> <span id="resumenPromedio"></span></div>
    <div class="dato"><strong>Última compra:</strong> <span id="resumenUltima"></span></div>
  </div>

  <!-- FIDELIZACIÓN -->
  <div class="card" id="fidelizacionCard" style="display:none;">
    <h3>🎁 Fidelización</h3>
    <span id="mensajeFidelizacion"></span>
  </div>

</div>

<!-- ============================= -->
<!-- TAB RANKINGS -->
<!-- ============================= -->

<div id="rankingTab" style="display:none;">

  <div class="card">
    <div id="topClientes"></div>
  </div>

  <div class="card">
    <div id="topClientesDinero"></div>
  </div>

</div>

<script src="/js/clientes.js"></script>

</body>
</html>
