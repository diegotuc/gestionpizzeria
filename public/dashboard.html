<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Dashboard del negocio</title>

<link rel="stylesheet" href="/css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>📊 Dashboard del negocio</h1>

<!-- ============================= -->
<!-- TARJETAS DE RESUMEN -->
<!-- ============================= -->

<div class="grid">

    <div class="card">
    <h3>Ventas del día</h3>
    <p id="ventasDia">0</p>
    <span id="trendVentas" class="trend"></span>
    </div>
    
    <div class="card">
    <h3>Facturación hoy</h3>
    <p id="totalDia">$0</p>
    <span id="trendFacturacion" class="trend"></span>
    </div>
    
    <div class="card">
    <h3>Pizzas vendidas</h3>
    <p id="pizzasDia">0</p>
    </div>
    
    <div class="card">
    <h3>Compras hoy</h3>
    <p id="clientesHoy">0</p>
    </div>
    
    <div class="card">
    <h3>Ticket promedio</h3>
    <p id="ticketPromedio">$0</p>
    </div>
    
    <div class="card">
    <h3>Promedio pizzas / compra</h3>
    <p id="promedioPizzas">0</p>
    </div>
    
    <div class="card">
    <h3>Pizza más vendida</h3>
    <p id="topPizza">-</p>
    </div>
    
    </div>

<!-- ============================= -->
<!-- GRAFICOS -->
<!-- ============================= -->

<div class="graficos">

<div class="grafico">
<h2>Ventas de la semana</h2>
<canvas id="graficoVentas"></canvas>
</div>

<div class="grafico">
<h2>Pizzas por sabor</h2>
<canvas id="graficoSabores"></canvas>
</div>

</div>


<!-- ============================= -->
<!-- ACTIVIDAD POR DIA -->
<!-- ============================= -->

<div class="ranking">

<h2>Actividad por día</h2>

<div id="ventasPorDia"></div>

</div>


<!-- ============================= -->
<!-- TOP PIZZAS -->
<!-- ============================= -->

<div class="ranking">

<h2>Top 5 pizzas</h2>

<ul id="topPizzas"></ul>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
